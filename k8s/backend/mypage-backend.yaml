apiVersion: apps/v1
kind: Deployment
metadata:
  name: mypage-backend
  namespace: apc-be-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mypage-backend
  template:
    metadata:
      labels:
        app: mypage-backend
    spec:
      serviceAccountName: mypage-backend-sa
      imagePullSecrets:
      - name: harbor-registry-secret
      containers:
      - name: mypage-backend
        image: 192.168.0.170:30000/alphacar/alphacar-mypage:3.0.2
        imagePullPolicy: Always
        ports:
        - containerPort: 3006
          name: http-mypage # Istio 인식을 위한 포트 이름
        env:
        - name: PORT
          value: "3006"
        - name: SERVICE_NAME
          value: "mypage-backend"
        # BASE_URL은 유지하되, 나중에 Istio Gateway 주소로 변경이 필요할 수 있습니다.
        - name: BASE_URL
          value: "https://192.168.56.200:31008"
        
        # [ConfigMap] apc-be-config 참조
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: apc-be-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: apc-be-config
              key: MONGO_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: apc-be-config
              key: MONGO_PORT
        - name: MARIADB_HOST
          valueFrom:
            configMapKeyRef:
              name: apc-be-config
              key: MARIADB_HOST
        - name: MARIADB_PORT
          valueFrom:
            configMapKeyRef:
              name: apc-be-config
              key: MARIADB_PORT

        # [Secret] apc-be-secret 참조
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: apc-be-secret
              key: MONGO_USER
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: apc-be-secret
              key: MONGO_PASS
        - name: DATABASE_NAME
          valueFrom:
            secretKeyRef:
              name: apc-be-secret
              key: MONGO_DB_NAME
        - name: MARIADB_USERNAME
          valueFrom:
            secretKeyRef:
              name: apc-be-secret
              key: MARIADB_USER
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: apc-be-secret
              key: MARIADB_PASS
        - name: MARIADB_DATABASE
          valueFrom:
            secretKeyRef:
              name: apc-be-secret
              key: MARIADB_DB_NAME
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: apc-be-secret
              key: JWT_SECRET

        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mypage-backend
  namespace: apc-be-ns
spec:
  selector:
    app: mypage-backend
  ports:
  - port: 3006
    targetPort: 3006
    protocol: TCP
    name: http-mypage # Istio 프로토콜 분석용 접두사 추가
  type: ClusterIP
