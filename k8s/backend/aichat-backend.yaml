apiVersion: apps/v1
kind: Deployment
metadata:
  name: aichat-backend
  namespace: apc-be-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aichat-backend
  template:
    metadata:
      labels:
        app: aichat-backend
    spec:
      serviceAccountName: aichat-backend-sa
      imagePullSecrets:
      - name: harbor-registry-secret
      containers:
      - name: aichat-backend
        image: 192.168.0.170:30000/alphacar/alphacar-aichat:1.0.32-c1d0917
        ports:
        - containerPort: 4000
          name: http-aichat # Istio 가이드에 따라 이름 지정
        env:
        - name: PORT
          value: "4000"
        - name: SERVICE_NAME
          value: "aichat-backend"
        # ConfigMap (apc-be-config) 참조
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: apc-be-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: apc-be-config
              key: MONGO_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: apc-be-config
              key: MONGO_PORT
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: apc-be-config
              key: AWS_REGION
        - name: BEDROCK_GUARDRAIL_ID
          valueFrom:
            configMapKeyRef:
              name: apc-be-config
              key: BEDROCK_GUARDRAIL_ID
        - name: BEDROCK_GUARDRAIL_VERSION
          valueFrom:
            configMapKeyRef:
              name: apc-be-config
              key: BEDROCK_GUARDRAIL_VERSION
        - name: BEDROCK_EMBEDDING_MODEL_ID
          valueFrom:
            configMapKeyRef:
              name: apc-be-config
              key: BEDROCK_EMBEDDING_MODEL_ID
        - name: BEDROCK_LLM_MODEL_ID
          valueFrom:
            configMapKeyRef:
              name: apc-be-config
              key: BEDROCK_LLM_MODEL_ID
        # AI 전용 Secret (apc-aichat-secret) 참조
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: apc-aichat-secret
              key: MONGO_USER
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: apc-aichat-secret
              key: MONGO_PASS
        - name: DATABASE_NAME
          valueFrom:
            secretKeyRef:
              name: apc-aichat-secret
              key: MONGO_DB_NAME
        # AWS 인증 Secret (alphacar-be-secret) 참조
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: apc-aichat-secret
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: apc-aichat-secret
              key: AWS_SECRET_ACCESS_KEY
        volumeMounts:
        - name: vector-store
          mountPath: /app/vector_store
        command: ["/bin/sh"]
        args: ["-c", "mkdir -p /app/vector_store && node /app/dist/main.js"]
        resources:
          requests:
            memory: "512Mi"
            cpu: "300m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: vector-store
        persistentVolumeClaim:
          claimName: aichat-vector-store-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: aichat-backend
  namespace: apc-be-ns
spec:
  selector:
    app: aichat-backend
  ports:
  - port: 4000
    targetPort: 4000
    protocol: TCP
    name: http-aichat # Istio 프로토콜 분석을 위해 http- 접두사 추가
  type: ClusterIP
