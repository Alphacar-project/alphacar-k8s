apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-backend
  namespace: apc-be-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: news-backend
  template:
    metadata:
      labels:
        app: news-backend
    spec:
      serviceAccountName: news-backend-sa
      imagePullSecrets:
      - name: harbor-registry-secret
      containers:
      - name: drive-backend
        image: 192.168.0.169/alphacar-project/alphacar-drive:1.0.0
        ports:
        - containerPort: 3008 # 환경변수 PORT와 일치시킴
          name: http-news
        env:
        - name: PORT
          value: "3008"
        - name: SERVICE_NAME
          value: "news-backend"
        # [ConfigMap] apc-be-config 참조
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: apc-be-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: apc-be-config
              key: MONGO_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: apc-be-config
              key: MONGO_PORT
        # [Secret] apc-be-secret 참조
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: apc-be-secret
              key: MONGO_USER
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: apc-be-secret
              key: MONGO_PASS
        - name: DATABASE_NAME
          valueFrom:
            secretKeyRef:
              name: apc-be-secret
              key: MONGO_DB_NAME
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: news-backend
  namespace: apc-be-ns
spec:
  selector:
    app: news-backend
  ports:
  - name: http-news # Istio 프로토콜 분석용 접두사
    port: 3008      # VirtualService 설정과 맞춤
    targetPort: 3008
    protocol: TCP
  type: ClusterIP
