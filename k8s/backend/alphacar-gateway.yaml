apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: alphacar-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
  # [1] HTTP (80) 설정
  # '*'로 되어 있어 모든 도메인을 HTTPS로 리다이렉트합니다.
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - '*'
    tls:
      httpsRedirect: true

  # [2] HTTPS (443) 설정 (수정됨)
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: ssl-cert # 사용 중인 인증서 시크릿
    hosts:
    - alphacar.cloud
    - www.alphacar.cloud  # <--- 여기에 www 도메인이 추가되었습니다.
