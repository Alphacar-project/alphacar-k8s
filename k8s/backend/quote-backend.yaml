apiVersion: apps/v1
kind: Deployment
metadata:
  name: quote-backend
  namespace: apc-be-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quote-backend
  template:
    metadata:
      labels:
        app: quote-backend
    spec:
      imagePullSecrets:
      - name: harbor-registry-secret
      containers:
      - name: quote-backend
        image: 192.168.0.169/bh/alphacar-quote:1.0.0.85
        ports:
        - containerPort: 3003
          name: http
        env:
        - name: PORT
          value: "3003"
        - name: SERVICE_NAME
          value: "quote-backend"

        # [핵심] DB 호스트/포트 설정 (alphacar-be-config 참조)
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: alphacar-be-config
              key: MONGO_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: alphacar-be-config
              key: MONGO_PORT
        - name: ESTIMATE_DB_HOST
          valueFrom:
            configMapKeyRef:
              name: alphacar-be-config
              key: MONGO_HOST
        - name: ESTIMATE_DB_PORT
          valueFrom:
            configMapKeyRef:
              name: alphacar-be-config
              key: MONGO_PORT

        # [핵심] DB 인증 및 보안 (alphacar-be-secret 참조)
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: alphacar-be-secret
              key: MONGO_USER
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: alphacar-be-secret
              key: MONGO_PASS
        - name: DATABASE_NAME
          valueFrom:
            secretKeyRef:
              name: alphacar-be-secret
              key: MONGO_DB_NAME
        - name: ESTIMATE_DB_USER
          valueFrom:
            secretKeyRef:
              name: alphacar-be-secret
              key: MONGO_USER
        - name: ESTIMATE_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: alphacar-be-secret
              key: MONGO_PASS
        - name: ESTIMATE_DB_NAME
          valueFrom:
            secretKeyRef:
              name: alphacar-be-secret
              key: MONGO_DB_NAME
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: alphacar-be-secret
              key: JWT_SECRET

        # [참고] MONGO_URI가 직접 필요한 경우를 위해 하드코딩된 변수 대신 위 값들을 소스에서 조합하거나 
        # 필요한 경우 ConfigMap에 MONGO_URI 전체 경로를 추가하여 사용하세요.
        # 일단 기존 변수명들에 매칭되는 값을 주입합니다.
        - name: MONGO_URI
          value: "mongodb://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)?authSource=admin"
        - name: MONGODB_URI
          value: "mongodb://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)?authSource=admin"
        - name: ESTIMATE_MONGO_URI
          value: "mongodb://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)?authSource=admin"

        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: quote-backend
  namespace: apc-be-ns
spec:
  selector:
    app: quote-backend
  ports:
  - port: 3003
    targetPort: 3003
    protocol: TCP
  type: ClusterIP
