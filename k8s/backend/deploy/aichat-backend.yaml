apiVersion: apps/v1
kind: Deployment
metadata:
  name: aichat-backend
  namespace: apc-be-ns
spec:
  replicas: 1
  revisionHistoryLimit: 1  # 👈 추가: 과거 ReplicaSet 기록을 1개만 남기고 삭제 (화면 정리)
  selector:
    matchLabels:
      app: aichat-backend
  template:
    metadata:
      labels:
        app: aichat-backend
    spec:
      imagePullSecrets:
      - name: harbor-registry-secret
      containers:
      - name: aichat-backend
        image: 192.168.0.170:30000/alphacar/alphacar-aichat:1.0.32-c1d0917
        imagePullPolicy: Always  # 👈 추가: 이미지를 항상 Harbor에서 새로 받아오도록 강제
        ports:
        - containerPort: 4000
          name: http-aichat
        env:
        - name: PORT
          value: "4000"
        # ... (이하 env 설정 동일)
        - name: SERVICE_NAME
          value: "aichat-backend"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: alphacar-be-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
        # ... (중략)
        volumeMounts:
        - name: vector-store
          mountPath: /app/vector_store
        command: ["/bin/sh"]
        args: ["-c", "mkdir -p /app/vector_store && node /app/aichat/dist/src/main.js"]
        resources:
          requests:
            memory: "512Mi"
            cpu: "300m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: vector-store
        persistentVolumeClaim:
          claimName: aichat-vector-store-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: aichat-backend
  namespace: apc-be-ns
spec:
  selector:
    app: aichat-backend
  ports:
  - port: 4000
    targetPort: 4000
    protocol: TCP
    name: http-aichat
  type: ClusterIP
