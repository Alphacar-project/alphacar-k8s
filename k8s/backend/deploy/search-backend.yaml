apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-backend
  namespace: apc-be-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-backend
  template:
    metadata:
      labels:
        app: search-backend
    spec:
      imagePullSecrets:
      - name: harbor-registry-secret
      containers:
      - name: search-backend
        image: 192.168.0.170:30000/alphacar/alphacar-search:1.0.32-c1d0917
        ports:
        - containerPort: 3007
          name: http-search # 서비스 포트 이름과 통일
        env:
        - name: PORT
          value: "3007"
        - name: SERVICE_NAME
          value: "search-backend"

        # [ConfigMap] alphacar-be-config 참조
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: alphacar-be-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: alphacar-be-config
              key: MONGO_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: alphacar-be-config
              key: MONGO_PORT

        # [Secret] alphacar-be-secret 참조
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: alphacar-be-secret
              key: MONGO_USER
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: alphacar-be-secret
              key: MONGO_PASS
        - name: DATABASE_NAME
          valueFrom:
            secretKeyRef:
              name: alphacar-be-secret
              key: MONGO_DB_NAME

        # [변수 조합] 소스 코드에서 URI가 직접 필요한 경우를 대비
        - name: MONGO_URI
          value: "mongodb://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)?authSource=admin"
        - name: MONGODB_URI
          value: "mongodb://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)?authSource=admin"

        command: ["sh", "-c"]
        args: ["node /app/search/dist/main.js"]
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: search-backend
  namespace: apc-be-ns
spec:
  selector:
    app: search-backend
  ports:
  - name: http-search
    port: 3007
    targetPort: 3007
    protocol: TCP
  type: ClusterIP
