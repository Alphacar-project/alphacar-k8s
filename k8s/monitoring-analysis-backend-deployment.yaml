              healthScore -= oomCount * 3;
            }
            healthScore = Math.max(0, Math.min(100, healthScore));
            
            const scoreColor = healthScore >= 80 ? '#28a745' : healthScore >= 60 ? '#ffc107' : '#dc3545';
            
            const html = '<!DOCTYPE html>' +
