apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube
  namespace: apc-cicd-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube
  template:
    metadata:
      labels:
        app: sonarqube
    spec:
      # nodeName: a-worker1  # [추가] 건강한 노드인 a-worker1에 강제 배치
      containers:
      - name: sonarqube
        image: sonarqube:lts-community
        ports:
        - containerPort: 9000
        env:
        - name: SONAR_ES_BOOTSTRAP_CHECKS_DISABLE
          value: "true"
        - name: SONAR_WEB_JAVAOPTS
          value: "-Xmx512m -Xms512m"
        - name: SONAR_CE_JAVAOPTS
          value: "-Xmx512m -Xms512m"
        - name: SONAR_ES_JAVAOPTS
          value: "-Xmx512m -Xms512m"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: sonarqube
  namespace: apc-cicd-ns
spec:
  type: NodePort
  ports:
  - port: 32000
    targetPort: 9000
    nodePort: 32000  # 시방서 정의 포트
  selector:
    app: sonarqube
