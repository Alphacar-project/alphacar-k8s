---
- name: Install open-iscsi on all Kubernetes nodes
  hosts: all
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Install open-iscsi
      apt:
        name: open-iscsi
        state: present
      when: ansible_os_family == "Debian"

    - name: Enable and start iscsid service
      systemd:
        name: iscsid
        enabled: yes
        state: started

    - name: Check iscsiadm version
      command: iscsiadm --version
      register: iscsiadm_version
      changed_when: false

    - name: Display iscsiadm version
      debug:
        msg: "{{ iscsiadm_version.stdout }}"

