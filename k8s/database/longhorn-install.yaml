apiVersion: v1
kind: Namespace
metadata:
  name: apc-backup-ns
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: longhorn-service-account
  namespace: apc-backup-ns
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: longhorn-role
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - events
  - nodes
  - namespaces
  - persistentvolumes
  - persistentvolumeclaims
  verbs:
  - "*"
- apiGroups:
  - longhorn.io
  resources:
  - "*"
  verbs:
  - "*"
- apiGroups:
  - storage.k8s.io
  resources:
  - storageclasses
  - volumeattachments
  - csidrivers
  - csistoragecapacities
  - csinodes
  verbs:
  - "*"
- apiGroups:
  - scheduling.k8s.io
  resources:
  - priorityclasses
  verbs:
  - "*"
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - "*"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: longhorn-bind
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: longhorn-role
subjects:
- kind: ServiceAccount
  name: longhorn-service-account
  namespace: apc-backup-ns
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: longhorn-storageclass
  namespace: apc-backup-ns
data:
  default-setting.yaml: |
    default-data-path: /var/lib/longhorn
    default-engine-image: longhornio/longhorn-engine:v1.6.0
    default-instance-manager-image: longhornio/longhorn-instance-manager:v1_20230825
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: longhorn-manager
  namespace: apc-backup-ns
spec:
  selector:
    matchLabels:
      app: longhorn-manager
  template:
    metadata:
      labels:
        app: longhorn-manager
    spec:
      serviceAccountName: longhorn-service-account
      hostNetwork: true
      hostPID: true
      containers:
      - name: longhorn-manager
        image: longhornio/longhorn-manager:v1.6.0
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: LONGHORN_INSTANCE_MANAGER_IMAGE
          value: "longhornio/longhorn-instance-manager:v1_20230825"
        - name: LONGHORN_ENGINE_IMAGE
          value: "longhornio/longhorn-engine:v1.6.0"
        - name: LONGHORN_SHARE_MANAGER_IMAGE
          value: "longhornio/longhorn-share-manager:v1.6.0"
        - name: LONGHORN_BACKING_IMAGE_MANAGER_IMAGE
          value: "longhornio/longhorn-backing-image-manager:v1.6.0"
        - name: LONGHORN_SUPPORT_BUNDLE_MANAGER_IMAGE
          value: "longhornio/longhorn-support-bundle-kit:v1.6.0"
        - name: LONGHORN_MANAGER_IMAGE
          value: "longhornio/longhorn-manager:v1.6.0"
        - name: LONGHORN_SERVICE_ACCOUNT
          value: "longhorn-service-account"
        - name: LONGHORN_NODE_DRIVER
          value: "true"
        command:
        - longhorn-manager
        - -d
        - daemon
        - --engine-image
        - longhornio/longhorn-engine:v1.6.0
        - --instance-manager-image
        - longhornio/longhorn-instance-manager:v1_20230825
        - --share-manager-image
        - longhornio/longhorn-share-manager:v1.6.0
        - --backing-image-manager-image
        - longhornio/longhorn-backing-image-manager:v1.6.0
        - --support-bundle-manager-image
        - longhornio/longhorn-support-bundle-kit:v1.6.0
        - --manager-image
        - longhornio/longhorn-manager:v1.6.0
        - --service-account
        - longhorn-service-account
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: dev
          mountPath: /host/dev
        - name: proc
          mountPath: /host/proc
        - name: longhorn
          mountPath: /var/lib/longhorn
      volumes:
      - name: dev
        hostPath:
          path: /dev
      - name: proc
        hostPath:
          path: /proc
      - name: longhorn
        hostPath:
          path: /var/lib/longhorn
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: longhorn-backend
  namespace: apc-backup-ns
spec:
  ports:
  - port: 9500
    targetPort: 9500
  selector:
    app: longhorn-manager
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn
provisioner: driver.longhorn.io
allowVolumeExpansion: true
parameters:
  numberOfReplicas: "1"
  staleReplicaTimeout: "30"
  fromBackup: ""
  accessMode: "rwo"
  replicaAutoBalance: "ignored"
  replicaSoftAntiAffinity: "ignored"
  replicaZoneSoftAntiAffinity: "ignored"
  replicaDiskSoftAntiAffinity: "ignored"
  backupCompressionMethod: "lz4"
  restoreVolumeRecurringJob: "ignored"
  snapshotDataIntegrity: "ignored"

