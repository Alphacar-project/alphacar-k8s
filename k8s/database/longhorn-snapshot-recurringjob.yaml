# Longhorn RecurringJobмқ„ нҶөн•ң MongoDB ліјлҘЁ мһҗлҸҷ мҠӨлғ…мғ·
# мқҙ м„Өм •мқҖ Longhorn UIм—җм„ңлҸ„ мғқм„ұн•  мҲҳ мһҲмҠөлӢҲлӢӨ.

apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: mongodb-daily-snapshot
  namespace: apc-backup-ns
spec:
  name: mongodb-daily-snapshot
  groups:
  - mongodb-backup
  task: snapshot
  cron: "0 1 * * *"  # л§Өмқј мҳӨм „ 1мӢң (Velero л°ұм—… м „м—җ мӢӨн–ү)
  retain: 7  # 7мқјк°„ ліҙкҙҖ
  concurrency: 3  # лҸҷмӢңм—җ 3к°ң ліјлҘЁк№Ңм§Җ мІҳлҰ¬
---
