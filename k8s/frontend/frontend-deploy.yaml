apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: apc-fe-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend # VirtualService의 destination.host와 일치해야 함
    spec:
      containers:
      - name: frontend
        image: 192.168.0.169/kdh/frontend:latest # Harbor 이미지
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend # VirtualService에서 부르는 이름
  namespace: apc-fe-ns
spec:
  type: ClusterIP # 이제 NodePort는 안 씁니다!
  ports:
  - port: 8000
    targetPort: 8000
    name: http-web
  selector:
    app: frontend
