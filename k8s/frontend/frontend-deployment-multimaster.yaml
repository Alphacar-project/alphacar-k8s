apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: apc-fe-ns
spec:
  replicas: 1
  revisionHistoryLimit: 1  # 👈 추가: 지저분한 회색 박스 수십 개를 싹 정리합니다.
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: frontend-sa
      imagePullSecrets:
      - name: harbor-registry-secret
      containers:
      - name: frontend
        image: 192.168.0.170:30000/alphacar/frontend:1.0.053-d53fade
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: API_URL
          value: "https://alphacar.cloud/api"
        - name: PORT
          value: "8000"
        - name: NEXT_PUBLIC_BASE_URL
          value: "https://alphacar.cloud"
        - name: NEXT_PUBLIC_DOMAIN
          value: "https://alphacar.cloud"
        - name: NODE_EXTRA_CA_CERTS
          value: "/etc/ssl/certs/selfsigned.crt"
        # [ConfigMap] apc-fe-config 참조
        - name: NEXT_PUBLIC_AICHAT_URL
          valueFrom:
            configMapKeyRef:
              name: apc-fe-config
              key: NEXT_PUBLIC_AICHAT_URL
        - name: NEXT_PUBLIC_API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: apc-fe-config
              key: NEXT_PUBLIC_API_BASE_URL
        volumeMounts:
        - name: ssl-cert
          mountPath: /etc/ssl/certs/selfsigned.crt
          subPath: selfsigned.crt
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: ssl-cert
        secret:
          secretName: ssl-cert
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: apc-fe-ns
spec:
  selector:
    app: frontend
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http-web
  type: ClusterIP
