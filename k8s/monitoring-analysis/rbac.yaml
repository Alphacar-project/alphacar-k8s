apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitoring-analysis-sa
  namespace: alphacar
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: monitoring-analysis-role
  namespace: alphacar
rules:
# Pod 로그 읽기 권한
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: monitoring-analysis-rolebinding
  namespace: alphacar
subjects:
- kind: ServiceAccount
  name: monitoring-analysis-sa
  namespace: alphacar
roleRef:
  kind: Role
  name: monitoring-analysis-role
  apiGroup: rbac.authorization.k8s.io

