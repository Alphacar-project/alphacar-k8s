apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-analysis-backend
  namespace: apc-obsv-ns  # 모니터링 네임스페이스에 배포 (필요시 변경)
  labels:
    app: monitoring-analysis-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoring-analysis-backend
  template:
    metadata:
      labels:
        app: monitoring-analysis-backend
    spec:
      containers:
      - name: backend
        # [중요] 아래 이미지 이름을 실제로 빌드해서 푸시한 이미지 이름으로 바꾸세요!
        # 예: docker.io/my-id/analysis-backend:latest
        image: 192.168.0.169/bh/monitoring-analysis-backend:1.0.0 
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: PORT
          value: "5000"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        # Dockerfile에 있던 헬스체크를 쿠버네티스 방식으로 변환
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
